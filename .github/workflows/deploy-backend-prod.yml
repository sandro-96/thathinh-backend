# Deploy production backend JAR → S3 → EC2 systemd (api.thathinh.vn)
# Shared EC2 with salsales — port 8081. Setup: docs/DEPLOY-PRODUCTION.md

name: Deploy backend (prod)

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'mvnw'
      - 'mvnw.cmd'
      - '.mvn/**'
      - 'ops/**'
      - '.github/workflows/deploy-backend-prod.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-prod
  cancel-in-progress: true

env:
  AWS_REGION: ap-southeast-1
  S3_DEPLOY_BUCKET: thathinh-deploy-prod
  S3_JAR_KEY: backend/thathinh-latest.jar
  EC2_INSTANCE_ID: i-08167ad5505b5b164

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build JAR
        run: chmod +x mvnw && ./mvnw -B package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload JAR to S3
        run: |
          JAR=$(ls target/thathinh-backend-*.jar | head -1)
          echo "Uploading $JAR"
          aws s3 cp "$JAR" "s3://${S3_DEPLOY_BUCKET}/${S3_JAR_KEY}"
          aws s3 cp "$JAR" "s3://${S3_DEPLOY_BUCKET}/backend/thathinh-${{ github.sha }}.jar"

      - name: Deploy on EC2 via SSM
        run: |
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          if [ -z "$INSTANCE_ID" ]; then
            INSTANCE_ID="${{ env.EC2_INSTANCE_ID }}"
          fi
          SSM_COMMANDS=$(jq -nc \
            --arg bucket "$S3_DEPLOY_BUCKET" \
            --arg key "$S3_JAR_KEY" \
            --arg region "$AWS_REGION" \
            '{commands: [
              "set -ex",
              "aws --version",
              ("aws s3 cp s3://" + $bucket + "/" + $key + " /tmp/thathinh.jar --region " + $region),
              "mv /tmp/thathinh.jar /opt/thathinh/app.jar",
              "chown ec2-user:ec2-user /opt/thathinh/app.jar",
              "bash /opt/thathinh/load-env.sh",
              "chown ec2-user:ec2-user /opt/thathinh/env.sh",
              "chmod 600 /opt/thathinh/env.sh",
              "systemctl restart thathinh",
              "systemctl is-active thathinh"
            ]}')
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy thathinh backend ${{ github.sha }}" \
            --parameters "$SSM_COMMANDS" \
            --query Command.CommandId --output text)
          echo "SSM CommandId: $COMMAND_ID"
          for i in $(seq 1 36); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query Status --output text 2>/dev/null || echo Pending)
            case "$STATUS" in Success|Failed|Cancelled|TimedOut) break ;; esac
            sleep 5
          done
          echo "SSM status: $STATUS"
          echo "=== SSM stdout ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query StandardOutputContent --output text
          echo "=== SSM stderr ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query StandardErrorContent --output text
          if [ "$STATUS" != "Success" ]; then
            exit 1
          fi

      - name: Verify public API health
        continue-on-error: true
        run: |
          for i in $(seq 1 18); do
            if curl -sf https://api.thathinh.vn/actuator/health | grep -q '"status":"UP"'; then
              echo "Public health OK"
              exit 0
            fi
            echo "Waiting for API... ($i/18)"
            sleep 10
          done
          echo "::warning::API health not UP yet — check journalctl on EC2"
          exit 0
