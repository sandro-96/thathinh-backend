# Nới lỏng giới hạn tần suất khi chạy test (nhiều lần đăng ký/gửi tin từ cùng IP 127.0.0.1).
app.rate-limit.auth.max-per-minute=100000
app.rate-limit.email.max-per-hour=100000
app.rate-limit.message.max-per-minute=100000
app.rate-limit.flirt.max-per-hour=100000

# Test chạy in-memory, không phụ thuộc Redis.
app.redis.enabled=false
management.health.redis.enabled=false
