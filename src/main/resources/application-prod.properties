# Profile được kích hoạt qua SPRING_PROFILES_ACTIVE (env), không đặt ở đây.
app.aws.s3.required=${AWS_S3_REQUIRED:true}

# Prod/staging: tắt auto-index lúc boot để tránh block startup khi Mongo chậm.
spring.data.mongodb.auto-index-creation=false

# Prod: chỉ domain thathinh.vn — không mở *.vercel.app
app.cors.allowed-origin-patterns[0]=${CORS_ORIGIN_0:https://thathinh.vn}
app.cors.allowed-origin-patterns[1]=${CORS_ORIGIN_1:https://www.thathinh.vn}
app.cors.allowed-origin-patterns[2]=${CORS_ORIGIN_2:https://www.thathinh.vn}
