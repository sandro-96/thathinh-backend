spring.application.name=thathinh-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
server.port=${PORT:8080}
app.brand.name=${APP_BRAND_NAME:Th\u1ea3 Th\u00ednh}
app.reset-token.expiry-minutes=15
app.google.client-id=${GOOGLE_CLIENT_ID:}
app.jwt.secret=${JWT_SECRET:dev-secret-change-in-production-min-32-chars!!}

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/thathinh}
spring.data.mongodb.database=${MONGODB_DATABASE:thathinhdb}
spring.data.mongodb.auto-index-creation=true

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.default-encoding=UTF-8

spring.thymeleaf.encoding=UTF-8
spring.cache.type=simple

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

app.flirt.match-timeout-seconds=60
app.flirt.cooldown-hours=24

app.rate-limit.message.max-per-minute=30
app.rate-limit.flirt.max-per-hour=10
app.rate-limit.auth.max-per-minute=10
app.rate-limit.email.max-per-hour=5

# Redis (dأ¹ng cho rate limit + hأ ng ؤ‘ل»£i ghأ©p ؤ‘أ´i khi scale nhiل»پu instance).
# Mل؛·c ؤ‘ل»‹nh tل؛¯t: chل؛،y in-memory (phأ¹ hل»£p dev/single instance). Bل؛­t ل»ں production: REDIS_ENABLED=true
app.redis.enabled=${REDIS_ENABLED:false}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
management.health.redis.enabled=${REDIS_ENABLED:false}
management.health.mail.enabled=${MAIL_HEALTH_ENABLED:false}
management.health.mongo.enabled=true

# Seed tأ i khoل؛£n admin: chل»‰ tل»± tل؛،o ل»ں dev, hoل؛·c khi ADMIN_SEED_ENABLED=true + ADMIN_PASSWORD ؤ‘ئ°ل»£c ؤ‘ل؛·t.
app.admin.seed-enabled=${ADMIN_SEED_ENABLED:false}
app.admin.email=${ADMIN_EMAIL:admin@thathinh.vn}
app.admin.password=${ADMIN_PASSWORD:}

app.aws.s3.bucket=${AWS_S3_BUCKET:}
app.aws.s3.region=${AWS_S3_REGION:ap-southeast-1}
app.aws.s3.public-url-base=${AWS_S3_PUBLIC_URL_BASE:}
app.aws.s3.required=${AWS_S3_REQUIRED:false}
app.aws.access-key=${AWS_ACCESS_KEY:}
app.aws.secret-key=${AWS_SECRET_KEY:}

app.cors.allowed-origin-patterns[0]=${CORS_ORIGIN_0:http://localhost:5173}
app.cors.allowed-origin-patterns[1]=${CORS_ORIGIN_1:http://localhost:3000}
app.cors.allowed-origin-patterns[2]=${CORS_ORIGIN_2:https://*.vercel.app}

app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.verification.expiry-hours=24
app.email.verification-required=${EMAIL_VERIFICATION_REQUIRED:true}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
